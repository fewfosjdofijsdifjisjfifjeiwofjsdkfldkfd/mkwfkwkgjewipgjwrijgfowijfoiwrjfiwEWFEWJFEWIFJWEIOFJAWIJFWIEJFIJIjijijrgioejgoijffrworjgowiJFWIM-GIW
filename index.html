<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS ARCHIVE</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #00f2ff;
      --accent-dim: rgba(0, 242, 255, 0.15);
      --bg: #030303;
      --panel: #07090a;
      --border: rgba(0, 242, 255, 0.12);
      --text: #c8d8dc;
      --muted: rgba(200, 216, 220, 0.35);
      --online: #00ff88;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,242,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      background: rgba(3, 3, 3, 0.95);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 0 30px rgba(0,242,255,0.06);
    }

    .navbar::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .nav-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 8px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,242,255,0.5), 0 0 40px rgba(0,242,255,0.2);
      user-select: none;
      cursor: default;
    }

    .nav-title .bracket {
      color: rgba(0,242,255,0.4);
      font-weight: 400;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      height: calc(100vh - 56px);
      position: relative;
      z-index: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 14px 16px 10px;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--accent);
      opacity: 0.7;
      border-bottom: 1px solid var(--border);
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(0,242,255,0.05);
      cursor: pointer;
      transition: background 0.15s, border-left 0.15s;
      border-left: 3px solid transparent;
      font-size: 12px;
      color: var(--muted);
    }

    .channel-item:hover {
      background: var(--accent-dim);
      color: var(--text);
    }

    .channel-item.active {
      border-left-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
    }

    .channel-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,242,255,0.08);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .channel-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .channel-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .groups-sep, .contacts-sep {
      padding: 10px 14px 6px;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── CHAT MAIN ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 10px 20px;
      background: rgba(3,3,3,0.9);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header-pfp {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(0,242,255,0.08);
      border: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    .chat-header-pfp img {
      width: 100%; height: 100%; object-fit: cover;
    }

    .chat-header-name {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .archive-badge {
      margin-left: auto;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 2px;
    }

    .chat-msgs {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-msgs::-webkit-scrollbar { width: 4px; }
    .chat-msgs::-webkit-scrollbar-track { background: transparent; }
    .chat-msgs::-webkit-scrollbar-thumb { background: rgba(0,242,255,0.2); border-radius: 2px; }

    /* ── MESSAGES ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 3px;
    }

    .msg.me { align-self: flex-end; }
    .msg.other { align-self: flex-start; }
    .msg.system { align-self: center; max-width: 90%; }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      color: var(--muted);
      padding: 0 2px;
    }

    .msg.me .msg-meta { justify-content: flex-end; }

    .msg-pfp {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #111;
      border: 1px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
    }

    .msg-sender {
      color: var(--accent);
      letter-spacing: 1px;
    }

    .msg-tag {
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .msg-time {
      color: rgba(200,216,220,0.2);
      font-size: 8px;
      margin-left: auto;
    }

    .msg-bubble {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }

    .msg.other .msg-bubble {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
    }

    .msg.me .msg-bubble {
      background: rgba(0,242,255,0.12);
      border: 1px solid rgba(0,242,255,0.25);
      color: #d0f4ff;
    }

    .msg.system .msg-bubble {
      background: rgba(0,242,255,0.06);
      border: 1px solid rgba(0,242,255,0.15);
      font-size: 10px;
      text-align: center;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .msg-gif {
      max-width: 220px;
      border-radius: 6px;
      display: block;
    }

    .mention {
      color: #4488ff;
      font-weight: bold;
    }

    /* readonly input area */
    .chat-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: rgba(3,3,3,0.9);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .readonly-input {
      flex: 1;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      pointer-events: none;
      letter-spacing: 1px;
    }

    .lock-icon {
      color: rgba(0,242,255,0.3);
      font-size: 14px;
    }

    /* loading / empty states */
    .state-msg {
      align-self: center;
      margin: auto;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .state-msg span {
      display: block;
      font-size: 28px;
      margin-bottom: 10px;
      opacity: 0.4;
    }

    /* scanning animation on load */
    @keyframes scan {
      0% { transform: translateY(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0; }
    }

    .scan-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 10px var(--accent);
      animation: scan 1.5s ease-in-out forwards;
      z-index: 9999;
      pointer-events: none;
    }

    /* pulse dot for live */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--online);
      box-shadow: 0 0 6px var(--online);
      animation: pulse 2s infinite;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="scan-line"></div>

  <nav class="navbar">
    <div class="nav-title">
      <span class="bracket">[</span> NEXUS ARCHIVE <span class="bracket">]</span>
    </div>
  </nav>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">CHANNELS</div>
      <div id="sidebar-channels"></div>
      <div class="groups-sep">GROUPS</div>
      <div id="sidebar-groups"></div>
      <div class="contacts-sep">CONTACTS</div>
      <div id="sidebar-contacts"></div>
    </div>

    <div class="chat-main">
      <div class="chat-header" id="chat-header">
        <div class="chat-header-pfp" id="header-pfp-wrap">
          <img id="header-pfp-img" src="https://via.placeholder.com/30" />
        </div>
        <div class="chat-header-name" id="header-name">SELECT A CHANNEL</div>
        <div class="archive-badge">READ-ONLY ARCHIVE</div>
      </div>

      <div class="chat-msgs" id="chat-msgs">
        <div class="state-msg" id="empty-state">
          <span>📂</span>
          SELECT A CHANNEL TO VIEW LOGS
        </div>
      </div>

      <div class="chat-footer">
        <span class="lock-icon">🔒</span>
        <div class="readonly-input">[ ARCHIVE MODE — MESSAGING DISABLED ]</div>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDKOq326tL8Kh1hraa_R0bV0MvYMUZotfk",
      authDomain: "realtime-database-3505d.firebaseapp.com",
      databaseURL: "https://realtime-database-3505d-default-rtdb.firebaseio.com",
      projectId: "realtime-database-3505d",
      storageBucket: "realtime-database-3505d.firebasestorage.app",
      messagingSenderId: "917293518076",
      appId: "1:917293518076:web:1cd71d04e6a37af7afdb79",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let activeChatId = null;
    let activeListener = null;

    // ── LOAD ALL CHANNELS INTO SIDEBAR ──
    function init() {
      // Global chatroom
      addSidebarItem('sidebar-channels', 'GLOBAL_CHAT', 'Live Chatroom', '#', null, 'channel');

      // Groups
      db.ref('groups').once('value', snap => {
        snap.forEach(g => {
          const data = g.val();
          if (!data) return;
          addSidebarItem('sidebar-groups', g.key, data.name, 'G', null, 'group');
        });
      });

      // Friends / private chats — scan all messages nodes for DM channels
      db.ref('users').once('value', snap => {
        const users = [];
        snap.forEach(child => users.push(child.key));

        // Build all possible DM pairs
        const dmKeys = new Set();
        for (let i = 0; i < users.length; i++) {
          for (let j = i + 1; j < users.length; j++) {
            const pair = [users[i], users[j]].sort().join('_');
            dmKeys.add(pair);
          }
        }

        dmKeys.forEach(chatId => {
          db.ref('messages/' + chatId).limitToLast(1).once('value', snap => {
            if (snap.exists()) {
              // chatId is "userA_userB"
              const [a, b] = chatId.split('_');
              const label = a + ' ↔ ' + b;
              addSidebarItem('sidebar-contacts', chatId, label, '💬', null, 'dm');
            }
          });
        });
      });
    }

    function addSidebarItem(containerId, chatId, label, iconText, pfpUrl, type) {
      const container = document.getElementById(containerId);
      if (!container) return;

      // Avoid duplicates
      if (container.querySelector(`[data-chat-id="${chatId}"]`)) return;

      const div = document.createElement('div');
      div.className = 'channel-item';
      div.dataset.chatId = chatId;

      div.innerHTML = `
        <div class="channel-icon">
          ${pfpUrl ? `<img src="${pfpUrl}" />` : `<span>${iconText}</span>`}
        </div>
        <span class="channel-label">${label}</span>
        ${type !== 'dm' ? `<span style="font-size:8px;opacity:0.3;letter-spacing:1px;">${type.toUpperCase()}</span>` : ''}
      `;

      div.onclick = () => openChannel(chatId, label, type);
      container.appendChild(div);
    }

    function openChannel(chatId, label, type) {
      // Update active state
      document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
      const el = document.querySelector(`[data-chat-id="${chatId}"]`);
      if (el) el.classList.add('active');

      // Update header
      document.getElementById('header-name').innerText = label;

      // Detach old listener
      if (activeChatId) {
        db.ref('messages/' + activeChatId).off();
      }
      activeChatId = chatId;

      // Clear messages
      const box = document.getElementById('chat-msgs');
      box.innerHTML = '<div class="state-msg"><span>⏳</span>LOADING LOGS...</div>';

      // Load messages
      db.ref('messages/' + chatId).limitToLast(100).on('child_added', snap => {
        const emptyState = box.querySelector('.state-msg');
        if (emptyState) emptyState.remove();

        renderMessage(box, snap.key, snap.val());
        box.scrollTop = box.scrollHeight;
      });

      // Handle empty
      db.ref('messages/' + chatId).limitToLast(1).once('value', snap => {
        if (!snap.exists()) {
          box.innerHTML = '<div class="state-msg"><span>🗂️</span>NO MESSAGES IN THIS CHANNEL</div>';
        }
      });
    }

    function renderMessage(box, key, d) {
      if (!d) return;

      const div = document.createElement('div');

      if (d.sender === '_system') {
        div.className = 'msg system';
        div.innerHTML = `<div class="msg-bubble">${escHtml(d.text || '')}</div>`;
        box.appendChild(div);
        return;
      }

      const isMe = false; // Archive mode — no "me"
      div.className = 'msg other';

      const time = d.timestamp ? new Date(d.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';

      // Build content
      if (d.gif) {
        div.innerHTML = `
          <div class="msg-meta">
            <img class="msg-pfp" id="pfp-${key}" src="https://via.placeholder.com/18" />
            <span class="msg-sender">${escHtml(d.sender || '')}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-bubble">
            <img class="msg-gif" src="${d.gif}" alt="GIF" loading="lazy" />
          </div>
        `;
      } else {
        let text = escHtml(d.text || '');
        text = text.replace(/@([a-zA-Z0-9_]+)/g, '<span class="mention">@$1</span>');

        let replyHtml = '';
        if (d.replyTo) {
          replyHtml = `<div style="font-size:9px;opacity:0.5;border-left:2px solid rgba(0,242,255,0.3);padding:3px 6px;margin-bottom:4px;letter-spacing:1px;">↩ ${escHtml(d.replyTo.sender)}: ${escHtml((d.replyTo.text||'').substring(0,40))}</div>`;
        }

        div.innerHTML = `
          <div class="msg-meta">
            <img class="msg-pfp" id="pfp-${key}" src="https://via.placeholder.com/18" />
            <span class="msg-sender">${escHtml(d.sender || '')}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-bubble">${replyHtml}${text}</div>
        `;
      }

      // Lazy-load pfp
      db.ref('users/' + d.sender + '/pfp').once('value', snap => {
        const img = document.getElementById('pfp-' + key);
        if (img && snap.val()) img.src = snap.val();
      });

      box.appendChild(div);
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    init();
  </script>
</body>
</html>
